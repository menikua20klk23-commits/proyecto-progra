<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Crear cuenta | Proyecto Proga IA</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-body">

<main class="auth-container">

    <section class="auth-card">

        <div class="auth-brand">
            <div class="brand-icon">&lt;/&gt;</div>

            <div>
                <h1>Proyecto Proga <span>IA</span></h1>
                <p>Aprende programación paso a paso</p>
            </div>
        </div>

        <div class="auth-header">
            <p class="section-label">NUEVA CUENTA</p>
            <h2>Crear cuenta</h2>
            <p>
                Tu progreso, historial y quizzes quedarán
                guardados de forma individual.
            </p>
        </div>

        {% if error %}
            <div class="auth-error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST"
              action="{{ url_for('registro') }}"
              class="auth-form">

            <label for="nombre">
                Nombre
            </label>

            <input id="nombre"
                   name="nombre"
                   type="text"
                   value="{{ nombre or '' }}"
                   required
                   maxlength="100"
                   autocomplete="name"
                   placeholder="Escribe tu nombre">

            <label for="correo">
                Correo electrónico
            </label>

            <input id="correo"
                   name="correo"
                   type="email"
                   value="{{ correo or '' }}"
                   required
                   autocomplete="email"
                   placeholder="usuario@correo.com">

            <label for="password">
                Contraseña
            </label>

            <input id="password"
                   name="password"
                   type="password"
                   required
                   minlength="8"
                   autocomplete="new-password"
                   placeholder="Mínimo 8 caracteres">

            <label for="confirmar_password">
                Confirmar contraseña
            </label>

            <input id="confirmar_password"
                   name="confirmar_password"
                   type="password"
                   required
                   minlength="8"
                   autocomplete="new-password"
                   placeholder="Repite tu contraseña">

            <button class="auth-submit-button"
                    type="submit">
                Crear cuenta
            </button>

        </form>

        <p class="auth-link">
            ¿Ya tienes cuenta?
            <a href="{{ url_for('login') }}">
                Iniciar sesión
            </a>
        </p>

    </section>

</main>

</body>
</html>
